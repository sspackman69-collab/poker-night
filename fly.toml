# Fly.io config. Run `fly launch` once (it may rename the app to keep it unique
# and set primary_region); then `fly deploy` for subsequent deploys.
app = "poker-night"
primary_region = "den"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  # Scale to zero when idle to stay in the free allowance. Note: room state is
  # in-memory, so a stopped machine loses active games.
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[env]
  PORT = "8080"
